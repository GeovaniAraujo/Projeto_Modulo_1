    <script>
    let temaEscuro = true;
    function alternarTema() {
        const btn = document.getElementById("btn-tema");
        temaEscuro = !temaEscuro;
        document.body.classList.toggle("tema-claro", !temaEscuro);
        btn.textContent = temaEscuro ? "🌙 Tema Escuro" : "☀️ Tema Claro";
    }
    </script>
